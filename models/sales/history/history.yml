version: 2

models:

  - name: hubspot__daily_deal_history
    description: >
      Each record represents a deal's day in Hubspot with tracked properties from the `DEAL_PROPERTY_HISTORY` source table pivoted out into columns. Enabled by setting `hubspot_sales_enabled`, `hubspot_deal_enabled`, and `hubspot_deal_property_history_enabled` to `True`.

      By default, tracks the deal's pipeline, pipeline stage, and amount. Additional properties can be tracked by configuring the `hubspot__deal_property_history_columns` variable.

      The start of a deal's history is its creation date, and its end is by default the close date (or the current date if still open).
      The history of a deal can be extended past its close date by configuring the `deal_history_extension_days` variable.
    columns:
      - name: source_relation
        description: "{{ doc('source_relation') }}"
      - name: deal_day_id
        description: Unique surrogate key hashed on `source_relation`, `date_day`, and `deal_id`.
        tests:
          - unique
          - not_null
      - name: date_day
        description: Date on which the deal had these values.
      - name: deal_id
        description: Unique id of a deal in Hubspot.
      - name: is_deal_closed
        description: Boolean indicating whether the deal's pipeline stage is closed.
      - name: amount
        description: The amount of the deal on that day.
      - name: pipeline_label
        description: The human-readable label for the deal pipeline.
      - name: pipeline_stage_label
        description: The human-readable label for the deal's stage.
      - name: deal_pipeline_id
        description: ID of the deal pipeline.
      - name: pipeline_stage_id
        description: ID of the deal pipeline stage.
      - name: amount_in_home_currency
        description: The amount of the deal in the account's home currency on that day.
      - name: owner_full_name
        description: The full name of the deal owner on that day.
      - name: owner_email_address
        description: The email address of the deal owner on that day.
      - name: hubspot_team_name
        description: The name of the Hubspot team associated with the deal on that day.
      - name: owner_id
        description: The ID of the deal owner on that day.
      - name: hubspot_team_id
        description: The ID of the Hubspot team associated with the deal on that day.

  - name: hubspot__company_history
    description: Each record represents a change to company record in Hubspot; the grain of this model is company_id -> field_name -> valid_to.
    columns:
      - name: source_relation
        description: "{{ doc('source_relation') }}"

      - name: _fivetran_synced
        description: '{{ doc("_fivetran_synced") }}'

      - name: change_source
        description: '{{ doc("history_source") }}'

      - name: change_source_id
        description: '{{ doc("history_source_id") }}'

      - name: valid_from
        description: The timestamp the change was valid from.

      - name: valid_to
        description: The timestamp the change was valid to. Null if still valid.

      - name: company_id
        description: The ID of the related company record.

      - name: field_name
        description: '{{ doc("history_name") }}'

      - name: new_value
        description: '{{ doc("history_value") }}'

      - name: id
        description: The ID of the change. Hashed on `source_relation`, `field_name`, `company_id`, and `valid_from`.
        tests:
          - unique
          - not_null

  - name: hubspot__deal_history
    description: Each record represents a change to deal record in Hubspot; the grain of this model is deal_id -> field_name -> valid_to.
    columns:
      - name: source_relation
        description: "{{ doc('source_relation') }}"
        
      - name: _fivetran_synced
        description: '{{ doc("_fivetran_synced") }}'

      - name: change_source
        description: '{{ doc("history_source") }}'

      - name: change_source_id
        description: '{{ doc("history_source_id") }}'

      - name: valid_from
        description: The timestamp the change was valid from.

      - name: valid_to
        description: The timestamp the change was valid to. Null if still valid.

      - name: deal_id
        description: The ID of the related deal record.

      - name: field_name
        description: '{{ doc("history_name") }}'

      - name: new_value
        description: '{{ doc("history_value") }}'

      - name: id
        description: The ID of the change. Hashed on `source_relation`, `field_name`, `deal_id`, and `valid_from`.
        tests:
          - unique
          - not_null