version: 2

models:

  - name: stg_hubspot__form
    description: Each record represents a form created in HubSpot, including metadata about its configuration and behavior.
    columns:
      - name: source_relation
        description: "{{ doc('source_relation') }}"
      - name: form_id
        description: Unique identifier for the form.
        tests:
          - not_null
      - name: action
        description: The form action type or endpoint triggered upon submission.
      - name: created_at
        description: Timestamp when the form was created.
      - name: css_class
        description: CSS class applied to the form for styling purposes.
      - name: follow_up_id
        description: ID of the follow-up action or workflow triggered by the form.
      - name: form_type
        description: Category of the form, such as regular, pop-up, or embedded form.
      - name: lead_nurturing_campaign_id
        description: ID of the associated lead nurturing campaign, if applicable.
      - name: method
        description: HTTP method used for form submission (typically POST).
      - name: form_name
        description: Name of the form as defined in HubSpot.
      - name: notify_recipients
        description: List of email addresses that receive notifications on form submissions.
      - name: portal_id
        description: '{{ doc("portal_id") }}'
      - name: redirect
        description: URL users are redirected to after submitting the form.
      - name: submit_text
        description: Text displayed on the form's submit button.
      - name: updated_at
        description: Timestamp when the form was last updated.
      - name: is_deleted
        description: '{{ doc("_fivetran_deleted") }}'

  - name: stg_hubspot__submission_response
    description: Each record represents a single field response from a HubSpot form submission.
    columns:
      - name: source_relation
        description: "{{ doc('source_relation') }}"
      - name: conversion_id
        description: Unique identifier for the specific form conversion event.
        tests:
          - not_null
      - name: form_id
        description: The ID of the form the submission belongs to.
      - name: field_name
        description: The name of the form field.
      - name: field_value
        description: The value submitted for the form field.
      - name: submitted_at
        description: Unix timestamp in milliseconds of when the form was submitted.
      - name: submitted_timestamp
        description: Timestamp of when the form was submitted, converted from the `submitted_at` field.
      - name: page_url
        description: The URL of the page where the form was submitted.
      - name: object_type_id
        description: The ID corresponding to the HubSpot object type associated with the submission.
      - name: _fivetran_synced
        description: '{{ doc("_fivetran_synced") }}'